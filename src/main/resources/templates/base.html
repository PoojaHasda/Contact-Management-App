<!DOCTYPE html>
<html 
class="dark"
lang="en"
th:fragment="parent(content,title,script)"
xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-th-replace="${title}">SCM</title>
    <link
    href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" data-th-href="@{'/css/output.css'}" />

</head>
<body dark:bg-gray-900>
    <div class="p-4">
        <section data-th-replace="${content}"></section>
      </div>


  <div th:replace="navbar :: navbar"></div>

  <footer class="p-4">@CopyRight: Contact page Application</footer>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.1/dist/flowbite.min.js"></script>
<th:block th:replace="${script}"></th:block>
</body>
</html>
