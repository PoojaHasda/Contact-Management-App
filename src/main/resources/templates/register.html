<!DOCTYPE html>
<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>r</title>
    <style>
      h1 {
        background-color: blueviolet;
        color: blue;
      }
    </style>

    <link rel="stylesheet" data-th-href="@{'/css/output.css'}" />

    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@2.5.1/dist/flowbite.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="content">
        <!-- card -->
      <div class="grid grid-cols-12 min-h-screen mt-8 mb-8">
        <!-- 12 grid mai se 6 ki space use kr ri h -->
         
        <div class="col-span-12 flex justify-center items-center">
          <div
            class="w-full max-w-xl p-4 border-t-8 border-blue-700 bg-white rounded-xl shadow sm:p-6 md:p-8 dark:bg-gray-800 dark:border-blue-700"
          >

          <!-- this is sign -->
            <form class="space-y-6" data-th-action="@{'/do-register'}" 
            data-th-object="${userform}"
            method="post"  
        
            >
    <!-- method k body m jayega data -->

    
            <!-- message here -->
             <div th:replace="~{message :: messagebox}"></div>
              <h5 class="text-xl font-medium text-gray-900 dark:text-white text-center ">
                SIGN UP
              </h5>
              <p class="font-normal text-gray-400 dark:text-gray-400">Create your account in a few minutes</p>
              <div class="mb-3 pt-0.5">
                <label
                for="name"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >UserName</label
              >
              <input
                type="text"
                name="name"
                id="name"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white"
                placeholder="Enter your name"
                required
              />
              <p
              data-th-if="${#fields.hasErrors('name')}"
              data-th-errors="*{name}"
              class="text-red-600 px-1 py-2"
            >
              Name is required
            </p>
              </div>
              <div class="mb-3 pt-0.5">
                <label
                  for="email"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Email</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white"
                  placeholder="name@company.com"
                  required
                />
                <p
                data-th-if="${#fields.hasErrors('email')}"
                data-th-errors="*{email}"
                class="text-red-600 px-1 py-2"
              ></p>
              </div>
              <div class="mb-3 pt-0.5 flex space-x-4">
                <div class="w-1/2">
                  <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
                  <input type="password" name="password" id="password"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white"
                    placeholder="••••••••" required />
                </div>
            
                <div class="w-1/2">
                  <label for="confirm_password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Confirm Password</label>
                  <input type="password" name="confirm_password" id="confirm_password"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white"
                    placeholder="••••••••" required />
                </div>
                <p
                data-th-if="${#fields.hasErrors('password')}"
                data-th-errors="*{password}"
                class="text-red-600 px-1 py-2"
              ></p>
              </div>
              
             <div class="mb-3 pt-0.5">
                <label
                for="phone"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Phone No.</label
              >
              
              <input
                type="number"
                name="phoneNumber"
                id="phone"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:placeholder-gray-400 dark:text-white"
                placeholder=""
                required
              />
              <p
              data-th-if="${#fields.hasErrors('phoneNumber')}"
              data-th-errors="*{phoneNumber}"
              class="text-red-600 px-1 py-2"
            ></p>
             </div>
              <div class="flex items-start">
                <div class="flex items-start">
                  <div class="flex items-center h-5">
                    <input
                      id="remember"
                      type="checkbox"
                      value=""
                      class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-blue-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-blue-600 dark:ring-offset-gray-800 dark:focus:ring-offset-gray-800"
                      required
                    />
                  </div>
                  <label
                    for="remember"
                    class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300"
                    >I accept the <span style="color: blue;"><u>Terms of Use</u></span> & <span style="color: blue;"><u>Privacy Policy</u></span></label
                  >
                </div>
              
              </div>
           <div class="flex justify-center space-x-3">
            <button
            type="submit"
            class=" text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-700 dark:hover:bg-blue-800 dark:focus:ring-blue-800 "
          >
            SignUp
          </button>
          <button
            type="reset"
            class=" text-white bg-orange-700 hover:bg-orange-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-orange-700 dark:hover:bg-orange-800 dark:focus:ring-blue-800"
          >
            Reset
          </button>
           </div>
              <div class="text-sm font-medium text-gray-500 dark:text-gray-300"></div>
                Already have an account?
                <a
                  href="/login"
                  class="text-blue-700 hover:underline dark:text-blue-500"
                  >Sign In</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- flowbite content -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.1/dist/flowbite.min.js"></script>
  </body>
</html>
